<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - The Grand Vista</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">The Grand Vista</a>
        <p>Create Admin Account</p>
      </div>

      <form id="register-form" class="auth-form">
        <div class="auth-alert" id="auth-alert" style="display:none"></div>

        <div class="auth-field">
          <label for="name"><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="name" placeholder="Your name" required>
        </div>

        <div class="auth-field">
          <label for="email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="auth-field">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary auth-btn" id="register-btn">
          <span id="register-text">Create Account</span>
          <span id="register-spinner" style="display:none"><i class="fas fa-spinner fa-spin"></i> Creating...</span>
        </button>
      </form>

      <div class="auth-footer" style="display:flex;justify-content:space-between">
        <a href="/login.html"><i class="fas fa-sign-in-alt"></i> Sign In</a>
        <a href="/"><i class="fas fa-arrow-left"></i> Home</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
